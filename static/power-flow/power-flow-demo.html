<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Flow Animation - Professional Demo</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        .layout {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
        }

        header {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 16px;
        }

        .animation-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            min-height: 600px;
        }

        #svg-container {
            width: 100%;
            height: 100%;
        }

        .controls-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            height: fit-content;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        section h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        section h3::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .control-grid {
            display: grid;
            gap: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Toggle Buttons */
        .toggle-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--primary-bg);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: var(--accent-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .toggle-btn.active.green {
            background: var(--accent-green);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        /* Sliders */
        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: var(--primary-bg);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent-blue);
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
        }

        .val-badge {
            min-width: 60px;
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--accent-blue);
            font-weight: 700;
        }

        /* Presets */
        .preset-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .preset-btn {
            background: var(--primary-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px 8px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            text-align: center;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .preset-btn:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .preset-btn.active {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.2);
        }

        .preset-btn strong {
            display: block;
            font-size: 13px;
        }

        .preset-btn span {
            font-size: 10px;
            color: var(--text-muted);
        }

        @media (max-width: 1100px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .controls-card {
                order: -1;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>⚡ Power Flow Lab</h1>
        <p>Interactive playground for the advanced battery visualization component</p>
    </header>

    <div class="layout">
        <!-- Main Animation -->
        <div class="animation-card">
            <div id="svg-container"></div>
        </div>

        <!-- Right Side Controls -->
        <div class="controls-card">
            <!-- Basic Status -->
            <section>
                <h3>System State</h3>
                <div class="control-grid">
                    <div class="field">
                        <label>Power Source</label>
                        <div class="toggle-group">
                            <button class="toggle-btn active" id="btn-battery">🔋 Battery</button>
                            <button class="toggle-btn" id="btn-socket">🔌 Adapter</button>
                        </div>
                    </div>
                    <div class="field">
                        <label>Charging Action</label>
                        <div class="toggle-group">
                            <button class="toggle-btn active" id="btn-idle">Holding</button>
                            <button class="toggle-btn green" id="btn-charging">Charging</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Sliders -->
            <section>
                <h3>Primary Metrics</h3>
                <div class="control-grid">
                    <div class="field">
                        <label>Battery Level</label>
                        <div class="slider-wrap">
                            <input type="range" id="input-level" min="0" max="100" value="75">
                            <span class="val-badge" id="val-level">75%</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>Animation Speed</label>
                        <div class="slider-wrap">
                            <input type="range" id="input-intensity" min="0.2" max="2" step="0.1" value="1.0">
                            <span class="val-badge" id="val-intensity">1.0x</span>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <h3>Advanced Telemetry</h3>
                <div class="control-grid">
                    <div class="field">
                        <label>Amperage (Current)</label>
                        <div class="slider-wrap">
                            <input type="range" id="input-amps" min="-6000" max="6000" step="50" value="-1200">
                            <span class="val-badge" id="val-amps">-1200 mA</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>Adapter Power</label>
                        <div class="slider-wrap">
                            <input type="range" id="input-adapter" min="0" max="140" value="0">
                            <span class="val-badge" id="val-adapter">0 W</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>Temperature</label>
                        <div class="slider-wrap">
                            <input type="range" id="input-temp" min="20" max="65" step="0.5" value="32">
                            <span class="val-badge" id="val-temp">32.0°C</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Preset Scenarios -->
            <section>
                <h3>Scenarios</h3>
                <div class="preset-grid">
                    <button class="preset-btn" data-preset="full">
                        <strong>Healthy</strong>
                        <span>100% • Idle</span>
                    </button>
                    <button class="preset-btn" data-preset="fast-charge">
                        <strong>Turbo Charge</strong>
                        <span>96W • Inflow</span>
                    </button>
                    <button class="preset-btn" data-preset="heavy-load">
                        <strong>Extreme Load</strong>
                        <span>Video Editing</span>
                    </button>
                    <button class="preset-btn" data-preset="critical">
                        <strong>Critical</strong>
                        <span>5% • Low Power</span>
                    </button>
                </div>
            </section>
        </div>
    </div>

    <script src="power-flow-component.js"></script>
    <script>
        // Default state with all new metrics
        const defaultState = {
            isPluggedIn: false,
            isCharging: false,
            batteryLevel: 75,
            powerFlowIntensity: 1.0,
            voltageMv: 12240,
            amperageMa: -1200,
            powerW: -14.6,
            systemPowerW: 14.6,
            adapterWatts: 0,
            adapterVoltageMv: 0,
            adapterCurrentMa: 0,
            currentCapacityMah: 4500,
            maxCapacityMah: 6000,
            temperatureC: 32.0,
            cycleCount: 142,
            timeRemainingMin: 225,
            sampledAt: new Date().toISOString()
        };

        // Initialize
        const comp = new PowerFlowComponent('svg-container', defaultState);

        // --- Event Listeners ---

        // Toggles
        document.getElementById('btn-battery').onclick = () => updateState({ isPluggedIn: false, isCharging: false });
        document.getElementById('btn-socket').onclick = () => updateState({ isPluggedIn: true });
        document.getElementById('btn-idle').onclick = () => updateState({ isCharging: false });
        document.getElementById('btn-charging').onclick = () => updateState({ isCharging: true, isPluggedIn: true });

        // Sliders
        const bindSlider = (id, prop, transform = (v) => v, suffix = '') => {
            const el = document.getElementById(`input-${id}`);
            const val = document.getElementById(`val-${id}`);
            el.oninput = (e) => {
                const v = transform(e.target.value);
                updateState({ [prop]: v });
                val.textContent = `${v}${suffix}`;
            };
        };

        bindSlider('level', 'batteryLevel', parseInt, '%');
        bindSlider('intensity', 'powerFlowIntensity', parseFloat, 'x');
        bindSlider('amps', 'amperageMa', parseInt, ' mA');
        bindSlider('adapter', 'adapterWatts', parseInt, ' W');
        bindSlider('temp', 'temperatureC', parseFloat, '°C');

        // Presets
        document.querySelectorAll('[data-preset]').forEach(btn => {
            btn.onclick = () => applyPreset(btn.dataset.preset);
        });

        function updateState(patch) {
            comp.setState(patch);
            syncUI();
        }

        function syncUI() {
            const s = comp.getState();
            
            // Buttons
            document.getElementById('btn-battery').classList.toggle('active', !s.isPluggedIn);
            document.getElementById('btn-socket').classList.toggle('active', s.isPluggedIn);
            document.getElementById('btn-idle').classList.toggle('active', !s.isCharging);
            document.getElementById('btn-charging').classList.toggle('active', s.isCharging);

            // Sliders
            document.getElementById('input-level').value = s.batteryLevel;
            document.getElementById('val-level').textContent = `${s.batteryLevel}%`;
            
            document.getElementById('input-intensity').value = s.powerFlowIntensity;
            document.getElementById('val-intensity').textContent = `${s.powerFlowIntensity.toFixed(1)}x`;

            document.getElementById('input-amps').value = s.amperageMa;
            document.getElementById('val-amps').textContent = `${s.amperageMa} mA`;

            document.getElementById('input-adapter').value = s.adapterWatts;
            document.getElementById('val-adapter').textContent = `${s.adapterWatts} W`;

            document.getElementById('input-temp').value = s.temperatureC;
            document.getElementById('val-temp').textContent = `${s.temperatureC.toFixed(1)}°C`;
        }

        function applyPreset(id) {
            let preset = {};
            switch(id) {
                case 'full':
                    preset = {
                        isPluggedIn: false,
                        isCharging: false,
                        batteryLevel: 100,
                        amperageMa: -450,
                        powerW: -5.4,
                        systemPowerW: 5.4,
                        adapterWatts: 0,
                        temperatureC: 28.5,
                        timeRemainingMin: 840
                    };
                    break;
                case 'fast-charge':
                    preset = {
                        isPluggedIn: true,
                        isCharging: true,
                        batteryLevel: 42,
                        amperageMa: 4800,
                        powerW: 62.4,
                        systemPowerW: 15.0,
                        adapterWatts: 96,
                        adapterVoltageMv: 20000,
                        temperatureC: 41.5,
                        timeRemainingMin: 45
                    };
                    break;
                case 'heavy-load':
                    preset = {
                        isPluggedIn: false,
                        isCharging: false,
                        batteryLevel: 65,
                        amperageMa: -5800,
                        powerW: -72.0,
                        systemPowerW: 72.0,
                        adapterWatts: 0,
                        temperatureC: 54.0,
                        timeRemainingMin: 52
                    };
                    break;
                case 'critical':
                    preset = {
                        isPluggedIn: false,
                        isCharging: false,
                        batteryLevel: 5,
                        amperageMa: -1800,
                        powerW: -21.0,
                        systemPowerW: 21.0,
                        adapterWatts: 0,
                        temperatureC: 38.0,
                        timeRemainingMin: 8
                    };
                    break;
            }
            updateState(preset);
            
            // Highlight active preset
            document.querySelectorAll('[data-preset]').forEach(b => {
                b.classList.toggle('active', b.dataset.preset === id);
            });
        }

        // Initial sync
        syncUI();
    </script>
</body>
</html>
